<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>ALGO_VISH Chart</title>
<script src="https://cdn.jsdelivr.net/npm/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
<style>
/* ── VARIABLES ── */
:root{
  --bg:#0d0f14;--bg2:#13161e;--bg3:#1a1d27;--bg4:#22263a;
  --bd:#2a2f45;--bd2:#363b55;--t:#e2e8f0;--t2:#8892aa;--t3:#4a5270;
  --G:#00d085;--R:#ff4560;--B:#4c8eff;--P:#a78bfa;--O:#f59e0b;
  --fn:'JetBrains Mono','Courier New',monospace
}
body.light{--bg:#f5f6fa;--bg2:#fff;--bg3:#f0f1f5;--bg4:#e4e6ef;--bd:#d0d4e8;--bd2:#b8bdd4;--t:#1a1d27;--t2:#5a6080;--t3:#9aa0bb}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--t);font-family:var(--fn);font-size:12px}
/* ── LAYOUT ── */
#app{display:flex;flex-direction:column;height:100vh}
#top{height:36px;background:var(--bg2);border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:5px;padding:0 10px;flex-shrink:0}
#main{display:flex;flex:1;overflow:hidden;min-height:0}
#sidebar{width:200px;background:var(--bg2);border-right:1px solid var(--bd);display:flex;flex-direction:column;flex-shrink:0}
#carea{flex:1;display:flex;flex-direction:column;min-width:0;min-height:0;position:relative}
#chart{flex:1;min-height:0;min-width:0}
#bot{height:36px;background:var(--bg2);border-top:1px solid var(--bd);display:flex;align-items:center;padding:0 10px;gap:8px;flex-shrink:0;flex-shrink:0}
/* ── TOP BAR ── */
.logo{color:var(--B);font-weight:800;font-size:13px;letter-spacing:1px}
.ldot{width:6px;height:6px;border-radius:50%;background:var(--G);box-shadow:0 0 5px var(--G);animation:pulse 1.5s ease infinite;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
#si{background:var(--bg3);border:1px solid var(--bd);color:var(--t);padding:3px 8px;border-radius:5px;width:155px;font-family:var(--fn);font-size:11px}
.tf,.tb{background:transparent;border:1px solid var(--bd);color:var(--t2);padding:2px 6px;border-radius:4px;cursor:pointer;font-size:10px;font-family:var(--fn);white-space:nowrap}
.tf:hover,.tb:hover,.tf.on,.tb.on{background:var(--B);border-color:var(--B);color:#fff}
.tb.on{background:var(--O)22;border-color:var(--O);color:var(--O)}
.sep{width:1px;height:16px;background:var(--bd);flex-shrink:0}
#cp{font-size:15px;font-weight:700;font-variant-numeric:tabular-nums}
.up{color:var(--G)}.dn{color:var(--R)}
#brokerTag{font-size:10px;color:var(--G);font-weight:600;display:none}
/* ── SYMBOL DROPDOWN ── */
#sw{position:relative}
#sdd{position:absolute;top:36px;left:0;width:280px;background:var(--bg2);border:1px solid var(--bd2);border-radius:7px;max-height:240px;overflow-y:auto;z-index:9999;display:none;box-shadow:0 8px 24px #00000080}
#sdd.open{display:block}
.sr{padding:6px 10px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--bd)}
.sr:hover{background:var(--bg3)}
.sn{font-weight:700;font-size:12px}.sd{font-size:10px;color:var(--t2)}
.sbg{font-size:9px;padding:1px 4px;border-radius:3px;background:var(--bg4);color:var(--t3)}
/* ── CUSTOM BAR ── */
#cbar{height:28px;background:var(--bg3);border-bottom:1px solid var(--bd);display:none;align-items:center;gap:7px;padding:0 10px;flex-shrink:0}
#cbar.show{display:flex}
#cbar label{font-size:10px;color:var(--t2)}
#cbar input[type=color]{width:22px;height:20px;border:1px solid var(--bd);border-radius:3px;cursor:pointer;padding:1px;background:transparent}
#cbar select{background:var(--bg3);border:1px solid var(--bd);color:var(--t);padding:2px 4px;border-radius:3px;font-size:10px;font-family:var(--fn)}
/* ── SIDEBAR ── */
#stabs{display:flex;border-bottom:1px solid var(--bd)}
.stab{flex:1;padding:6px 0;text-align:center;cursor:pointer;font-size:10px;color:var(--t2);border-bottom:2px solid transparent}
.stab.on{color:var(--B);border-bottom-color:var(--B)}
#sbody{flex:1;overflow-y:auto;padding:5px}
/* WL tabs */
#wltabs{display:flex;gap:3px;margin-bottom:5px}
.wltb{flex:1;padding:3px 0;text-align:center;font-size:9px;border-radius:4px;cursor:pointer;border:1px solid var(--bd);color:var(--t2);background:transparent}
.wltb.on{background:var(--B);border-color:var(--B);color:#fff}
.adds{display:flex;gap:3px;margin-bottom:5px}
.adds input{flex:1;background:var(--bg3);border:1px solid var(--bd);color:var(--t);padding:3px 6px;border-radius:4px;font-family:var(--fn);font-size:11px}
.adds button{background:var(--B);border:none;color:#fff;padding:3px 7px;border-radius:4px;cursor:pointer}
.wr{padding:5px 7px;border-radius:5px;cursor:pointer;border:1px solid transparent;margin-bottom:2px;display:flex;justify-content:space-between;align-items:center}
.wr:hover,.wr.on{background:var(--bg3);border-color:var(--bd)}
.wsym{font-weight:700;font-size:11px}.wex{font-size:9px;padding:1px 3px;border-radius:3px;background:var(--bg4);color:var(--t3);margin-left:3px}
/* Indicators */
.ir{padding:6px 7px;border-radius:5px;background:var(--bg3);margin-bottom:3px;border:1px solid var(--bd)}
.ib{background:transparent;border:1px solid var(--bd);color:var(--t2);padding:2px 5px;border-radius:3px;cursor:pointer;font-size:10px}
.ib:hover{color:var(--t)}.ib.del{color:var(--R);border-color:var(--R)30}
/* Canvas */
#cv{position:absolute;top:0;left:0;pointer-events:none;z-index:2}
#ov{position:absolute;top:0;left:0;z-index:3;display:none;cursor:crosshair}
/* Fit button */
#fitb{position:absolute;bottom:44px;right:8px;z-index:10;background:var(--bg3);border:1px solid var(--bd);color:var(--t2);padding:4px 8px;border-radius:5px;cursor:pointer;font-size:11px}
#fitb:hover{border-color:var(--B);color:var(--B)}
/* Loader */
#ldr{position:absolute;inset:0;z-index:5;background:var(--bg)90;display:none;align-items:center;justify-content:center;gap:8px;font-size:12px;color:var(--t2);pointer-events:none}
.spin{width:14px;height:14px;border:2px solid var(--bd2);border-top-color:var(--B);border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
/* OHLC crosshair */
#ohlc{position:absolute;top:6px;left:6px;background:var(--bg2)ee;border:1px solid var(--bd);border-radius:5px;padding:3px 7px;font-size:11px;pointer-events:none;z-index:10;display:none;gap:7px}
#ohlc.show{display:flex}
/* Toast */
#toast{position:fixed;bottom:14px;right:14px;padding:9px 14px;border-radius:7px;font-size:12px;font-weight:600;z-index:99999;max-width:360px;border:1px solid;opacity:0;transition:opacity .3s;pointer-events:none}
/* Utils */
.note{font-size:10px;color:var(--t3);padding:8px;text-align:center}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:3px}
/* Modals */
.ov2{position:fixed;inset:0;background:#00000090;display:none;align-items:center;justify-content:center;z-index:9999}
.ov2.open{display:flex}
.modal{background:var(--bg2);border:1px solid var(--bd2);border-radius:10px;padding:16px;width:420px;max-height:85vh;overflow-y:auto}
.mh{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.mc{background:none;border:none;color:var(--t2);font-size:20px;cursor:pointer}
.ml{display:block;font-size:10px;color:var(--t2);margin-bottom:3px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.mi,.ms{width:100%;background:var(--bg3);border:1px solid var(--bd);color:var(--t);padding:6px 8px;border-radius:5px;font-family:var(--fn);font-size:11px}
.ms option{background:var(--bg2)}
.mta{width:100%;background:var(--bg3);border:1px solid var(--bd);color:var(--t);padding:6px 8px;border-radius:5px;font-family:var(--fn);font-size:11px;height:75px;resize:vertical}
.mr{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:7px}
.mbtns{display:flex;gap:6px;margin-top:12px}
.mprimary{flex:1;border:none;color:#fff;padding:8px;border-radius:6px;cursor:pointer;font-weight:700;font-size:12px;font-family:var(--fn)}
.mcancel{background:transparent;border:1px solid var(--bd);color:var(--t2);padding:8px 12px;border-radius:6px;cursor:pointer;font-size:12px;font-family:var(--fn)}
</style>
</head>
<body>
<div id="app">

<!-- DRAW CUSTOMIZATION BAR -->
<div id="cbar">
  <label>Color:</label><input type="color" id="dCol" value="#4c8eff" oninput="DS.update()">
  <label>Width:</label>
  <select id="dWid" onchange="DS.update()"><option value="1">1px</option><option value="2">2px</option><option value="3">3px</option></select>
  <label>Style:</label>
  <select id="dSty" onchange="DS.update()"><option>solid</option><option>dashed</option><option>dotted</option></select>
  <span id="fillWrap" style="display:none;align-items:center;gap:5px">
    <label>Fill:</label>
    <input type="range" id="dOpa" min="0" max="100" value="20" style="width:50px" oninput="DS.update();document.getElementById('opv').textContent=this.value+'%'">
    <span id="opv" style="font-size:10px;color:var(--t2);width:28px">20%</span>
  </span>
  <div style="margin-left:auto;display:flex;gap:4px">
    <button class="tb" onclick="DS.deleteSel()">🗑</button>
    <button class="tb" onclick="DS.deselect()">✕</button>
  </div>
</div>

<!-- TOP BAR -->
<div id="top">
  <div class="logo">⚡ALGO_VISH</div>
  <div class="ldot" id="ldot"></div>
  <div id="sw">
    <input id="si" placeholder="Search symbol..." autocomplete="off"
      oninput="SYM.filter(this.value)" onfocus="SYM.filter(this.value||'')">
    <div id="sdd"></div>
  </div>
  <!-- TF buttons -->
  <button class="tf" onclick="Chart.setTF('1m')">1M</button>
  <button class="tf" onclick="Chart.setTF('3m')">3M</button>
  <button class="tf on" onclick="Chart.setTF('5m')">5M</button>
  <button class="tf" onclick="Chart.setTF('10m')">10M</button>
  <button class="tf" onclick="Chart.setTF('15m')">15M</button>
  <button class="tf" onclick="Chart.setTF('30m')">30M</button>
  <button class="tf" onclick="Chart.setTF('1h')">1H</button>
  <button class="tf" onclick="Chart.setTF('4h')">4H</button>
  <button class="tf" onclick="Chart.setTF('1d')">1D</button>
  <div class="sep"></div>
  <!-- Drawing tools -->
  <button class="tb" id="dHL" onclick="Draw.setTool('hline')">— H</button>
  <button class="tb" id="dAL" onclick="Draw.setTool('aline')">🔔 Alert</button>
  <button class="tb" id="dTL" onclick="Draw.setTool('tline')">↗ Trend</button>
  <button class="tb" id="dRE" onclick="Draw.setTool('rect')">▭ Zone</button>
  <button class="tb" id="dFI" onclick="Draw.setTool('fib')">𝄘 Fib</button>
  <button class="tb" id="dLS" onclick="Draw.setTool('ls')">⊕ L/S</button>
  <button class="tb" id="dBR" onclick="Draw.setTool('brush')">✏</button>
  <button class="tb" onclick="Draw.clearAll()">✕</button>
  <div class="sep"></div>
  <!-- Price + broker -->
  <div id="brokerTag" style="font-size:10px;color:var(--G);font-weight:600;display:none"></div>
  <span id="cp">—</span>
  <span id="chg" style="font-size:11px"></span>
  <button class="tb" onclick="BotCfg.open()" id="bst" style="border-color:var(--R)50;color:var(--R)">⚡Bot</button>
  <button class="tb" id="thb" onclick="Chart.toggleTheme()">☀️</button>
</div>

<div id="main">
  <!-- SIDEBAR -->
  <div id="sidebar">
    <div id="stabs">
      <div class="stab on" onclick="UI.showTab('wl',this)">Watch</div>
      <div class="stab" onclick="UI.showTab('ind',this)">Ind</div>
      <div class="stab" onclick="UI.showTab('al',this)">Alerts</div>
    </div>
    <div id="sbody">
      <!-- WATCHLIST -->
      <div id="st-wl">
        <div id="wltabs">
          <div class="wltb on" id="wl1btn" onclick="WL.setActive(1)">WL1</div>
          <div class="wltb" id="wl2btn" onclick="WL.setActive(2)">WL2</div>
          <div class="wltb" id="wl3btn" onclick="WL.setActive(3)">WL3</div>
        </div>
        <div id="wl1info" style="font-size:9px;color:var(--B);display:none;margin-bottom:3px">📡 From AlgoBot</div>
        <div class="adds" id="wlAddRow">
          <input id="addIn" placeholder="BTCUSDT or SBIN" onkeydown="if(event.key==='Enter')WL.add()">
          <button onclick="WL.add()">+</button>
        </div>
        <div id="wlEl"></div>
      </div>
      <!-- INDICATORS -->
      <div id="st-ind" style="display:none">
        <button class="tb" style="width:100%;text-align:center;padding:5px;display:block;margin-bottom:5px" onclick="IndMgr.openModal()">+ Add Indicator</button>
        <div id="indEl"></div>
      </div>
      <!-- ALERTS -->
      <div id="st-al" style="display:none">
        <div style="display:flex;gap:3px;margin-bottom:5px">
          <button class="tb" style="flex:1;font-size:10px" onclick="AlertPanel.open()">+ Alert</button>
          <button class="tb" style="flex:1;font-size:10px;color:var(--P);border-color:var(--P)40" onclick="AlertPanel.openMass()">⚡ WL Mass</button>
        </div>
        <div id="alEl"></div>
        <div class="note" id="noAl">No alerts</div>
      </div>
    </div>
  </div>

  <!-- CHART AREA -->
  <div id="carea">
    <div id="chart"></div>
    <canvas id="cv"></canvas>
    <div id="ov"></div>
    <div id="ohlc"><span style="color:var(--B)">O:<b id="xO">—</b></span><span style="color:var(--G)">H:<b id="xH">—</b></span><span style="color:var(--R)">L:<b id="xL">—</b></span><span style="color:var(--O)">C:<b id="xC">—</b></span></div>
    <div id="ldr"><div class="spin"></div>Loading...</div>
    <button id="fitb" onclick="Chart.fit()">⊡ Fit</button>
    <div id="bot">
      <button class="tb" style="background:var(--B);border-color:var(--B);color:#fff;padding:5px 14px" onclick="AlertPanel.open()">🔔 Create Alert</button>
      <span id="botInfo" style="font-size:10px;color:var(--t2)"></span>
    </div>
  </div>
</div>

</div><!-- #app -->

<!-- INDICATOR MODAL -->
<div class="ov2" id="indModal">
  <div class="modal">
    <div class="mh"><span style="font-size:13px;font-weight:700" id="indMT">Add Indicator</span><button class="mc" onclick="IndMgr.closeModal()">✕</button></div>
    <label class="ml">Name</label><input class="mi" id="iname" placeholder="My Indicator" style="margin-bottom:6px">
    <label class="ml">Type</label>
    <select class="ms" id="itype" style="margin-bottom:6px">
      <option value="ema_cross">EMA Crossover (9×15)</option>
      <option value="candle_color">Candle Color (Green=BUY/Red=SELL)</option>
      <option value="orb">ORB — 5min Opening Range Breakout</option>
      <option value="sma">SMA</option>
      <option value="ema">EMA (single)</option>
      <option value="bb">Bollinger Bands (20,2)</option>
      <option value="vwap">VWAP</option>
      <option value="pine">Custom Pine Script</option>
    </select>
    <div class="mr">
      <div><label class="ml">Period</label><input class="mi" type="number" id="iperiod" value="20"></div>
      <div><label class="ml">Color</label><input type="color" id="icolor" value="#a78bfa" style="width:100%;height:32px;border-radius:5px;border:1px solid var(--bd);cursor:pointer;padding:2px;background:var(--bg3)"></div>
    </div>
    <label class="ml">Pine Script</label>
    <textarea class="mta" id="iscript" placeholder="Paste Pine Script here"></textarea>
    <div class="mbtns">
      <button class="mcancel" onclick="IndMgr.closeModal()">Cancel</button>
      <button class="mprimary" id="indSaveBtn" onclick="IndMgr.save()" style="background:var(--P)">Save</button>
    </div>
  </div>
</div>

<!-- BOT CONFIG MODAL -->
<div class="ov2" id="botModal">
  <div class="modal" style="width:380px">
    <div class="mh"><span style="font-size:13px;font-weight:700">⚡ AlgoBot + Sheets</span><button class="mc" onclick="BotCfg.close()">✕</button></div>
    <label class="ml">AlgoBot URL</label><input class="mi" id="botUrlM" placeholder="http://34.47.182.99:5000" style="margin-bottom:7px">
    <label class="ml">Google Sheets URL</label><input class="mi" id="sheetUrlM" placeholder="https://script.google.com/..." style="margin-bottom:10px">
    <div class="mbtns">
      <button class="mcancel" onclick="BotCfg.close()">Cancel</button>
      <button class="mprimary" onclick="BotCfg.save()" style="background:var(--B)">Save & Connect</button>
    </div>
  </div>
</div>

<!-- L/S MODAL -->
<div class="ov2" id="lsModal">
  <div class="modal" style="width:340px">
    <div class="mh"><span style="font-size:13px;font-weight:700">Long / Short</span><button class="mc" onclick="document.getElementById('lsModal').classList.remove('open')">✕</button></div>
    <div class="mr"><div><label class="ml">Entry</label><input class="mi" type="number" id="lsE" step="any" oninput="LS.calc()"></div><div><label class="ml">Qty</label><input class="mi" type="number" id="lsQ" value="1"></div></div>
    <div class="mr"><div><label class="ml">Stop Loss</label><input class="mi" type="number" id="lsSL" step="any" oninput="LS.calc()"></div><div><label class="ml">Target</label><input class="mi" type="number" id="lsT" step="any" oninput="LS.calc()"></div></div>
    <div id="lsCalc" style="padding:7px;border-radius:5px;background:var(--bg3);border:1px solid var(--bd);font-size:11px;line-height:1.8;margin-bottom:8px">Enter prices</div>
    <div class="mbtns"><button class="mcancel" onclick="document.getElementById('lsModal').classList.remove('open')">Cancel</button><button class="mprimary" onclick="LS.confirm()" style="background:var(--G)">Plot</button></div>
  </div>
</div>

<div id="toast"></div>

<!-- ═══════════════════════════════════════════════
     LOAD MODULES — ORDER MATTERS
═══════════════════════════════════════════════ -->
<script src="symbols.js"></script>
<script src="alerts.js"></script>
<script src="indicators_ema_cross.js"></script>
<script src="indicators_candle_color.js"></script>
<script src="indicators_orb.js"></script>
<script src="chart_engine.js"></script>
<script src="chart_init.js"></script>

</body>
</html>
